<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="pyMenvic is the technical hub and portfolio for Menvic projects, led by pyMenvic Revit Tools for pyRevit/Revit production workflows.">
  <meta property="og:title" content="pyMenvic | Technical hub and Revit tools portfolio">
  <meta property="og:description" content="pyMenvic Revit Tools is the primary professional project, supported by selected apps, documentation notes, and support routes.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>pyMenvic | Technical hub and Revit tools portfolio</title>
</head>
<body>
  <div id="root"></div>
  <script>
    window.addEventListener("error", function (event) {
      document.documentElement.dataset.appError = event.message || "Script error";
    });
  </script>
  <script type="module">
    async function loadApp() {
      if (import.meta.env?.DEV) {
        await import("/src/main.jsx");
        return;
      }

      const stylesheet = document.createElement("link");
      stylesheet.rel = "stylesheet";
      stylesheet.href = "/assets/app/home.css";
      document.head.append(stylesheet);

      const staticBundle = "/assets/app/home.bundle.js";
      await import(/* @vite-ignore */ staticBundle);
    }

    loadApp().catch((error) => {
      document.documentElement.dataset.appError = error instanceof Error ? error.message : "App load failed";
      console.error(error);
    });
  </script>
</body>
</html>
